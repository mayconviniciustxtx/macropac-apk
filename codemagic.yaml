workflows:
  android-apk:
    name: Macropac APK Segundo Plano V5
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Criar estrutura Android
        script: |
          rm -rf android
          flutter create --platforms=android --project-name macropac_rastreamento .

      - name: Ajustar Android Manifest para rastreamento em segundo plano
        script: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          texto = manifest.read_text(encoding="utf-8")
          permissoes = [
              '    <uses-permission android:name="android.permission.INTERNET"/>',
              '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>',
              '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>',
              '    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>',
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>',
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/>',
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>',
              '    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>',
              '    <uses-permission android:name="android.permission.WAKE_LOCK"/>'
          ]
          for p in permissoes:
              if p not in texto:
                  pos = texto.find(">")
                  texto = texto[:pos + 1] + "\n" + p + texto[pos + 1:]
          service_tag = '''        <service
                      android:name="id.flutter.flutter_background_service.BackgroundService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="location" />
          '''
          if "id.flutter.flutter_background_service.BackgroundService" not in texto:
              texto = texto.replace("</application>", service_tag + "\n    </application>")
          manifest.write_text(texto, encoding="utf-8")
          PY

      - name: Baixar dependências
        script: |
          flutter pub get

      - name: Gerar APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
