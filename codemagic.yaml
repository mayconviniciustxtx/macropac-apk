workflows:
  android-apk:
    name: Macropac APK
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Criar estrutura Android
        script: |
          rm -rf android
          flutter create --platforms=android --project-name macropac_rastreamento .

      - name: Baixar dependências
        script: |
          flutter pub get

      - name: Gerar APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
