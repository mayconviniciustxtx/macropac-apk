workflows:
  android-apk:
    name: Macropac APK V7 Segundo Plano Nativo
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Criar estrutura Android limpa
        script: |
          rm -rf android
          flutter create --platforms=android --project-name macropac_rastreamento .

      - name: Criar serviço nativo Android
        script: |
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          texto = manifest.read_text(encoding="utf-8")

          if 'xmlns:tools=' not in texto:
              texto = texto.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android"\n    xmlns:tools="http://schemas.android.com/tools">'
              )

          permissoes = [
              '    <uses-permission android:name="android.permission.INTERNET"/>',
              '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>',
              '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>',
              '    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>',
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>',
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/>',
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>',
              '    <uses-permission android:name="android.permission.WAKE_LOCK"/>'
          ]

          for p in permissoes:
              if p not in texto:
                  pos = texto.find(">")
                  texto = texto[:pos + 1] + "\n" + p + texto[pos + 1:]

          service = '''        <service
                      android:name=".TrackingService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="location" />
          '''

          if '.TrackingService' not in texto:
              texto = texto.replace("</application>", service + "\n    </application>")

          manifest.write_text(texto, encoding="utf-8")

          gradle = Path("android/app/build.gradle.kts")
          if not gradle.exists():
              gradle = Path("android/app/build.gradle")

          g = gradle.read_text(encoding="utf-8")
          dep = 'implementation("com.google.android.gms:play-services-location:21.3.0")'

          if "play-services-location" not in g:
              if "dependencies {" in g:
                  g = g.replace("dependencies {", "dependencies {\n    " + dep, 1)
              else:
                  g += "\n\ndependencies {\n    " + dep + "\n}\n"

          gradle.write_text(g, encoding="utf-8")

          kotlin_dir = Path("android/app/src/main/kotlin/com/example/macropac_rastreamento")
          kotlin_dir.mkdir(parents=True, exist_ok=True)

          main_activity = r'''
package com.example.macropac_rastreamento

import android.content.Intent
import android.os.Build
import io.flutter.embedding.android.FlutterActivity
import io.flutter.embedding.engine.FlutterEngine
import io.flutter.plugin.common.MethodChannel

class MainActivity: FlutterActivity() {
    private val CHANNEL = "macropac/native"

    override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
        super.configureFlutterEngine(flutterEngine)

        MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
            when (call.method) {
                "startTrackingService" -> {
                    try {
                        val intent = Intent(this, TrackingService::class.java)
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                            startForegroundService(intent)
                        } else {
                            startService(intent)
                        }
                        result.success("servico_iniciado")
                    } catch (e: Exception) {
                        result.error("ERRO_START_SERVICE", e.message, null)
                    }
                }
                "stopTrackingService" -> {
                    try {
                        val intent = Intent(this, TrackingService::class.java)
                        stopService(intent)
                        result.success("servico_parado")
                    } catch (e: Exception) {
                        result.error("ERRO_STOP_SERVICE", e.message, null)
                    }
                }
                else -> result.notImplemented()
            }
        }
    }
}
'''
          tracking_service = r'''
package com.example.macropac_rastreamento

import android.Manifest
import android.app.Notification
import android.app.NotificationChannel
import android.app.NotificationManager
import android.app.Service
import android.content.Context
import android.content.Intent
import android.content.pm.PackageManager
import android.location.Location
import android.os.Build
import android.os.IBinder
import android.os.Looper
import androidx.core.app.ActivityCompat
import androidx.core.app.NotificationCompat
import com.google.android.gms.location.FusedLocationProviderClient
import com.google.android.gms.location.LocationCallback
import com.google.android.gms.location.LocationRequest
import com.google.android.gms.location.LocationResult
import com.google.android.gms.location.LocationServices
import com.google.android.gms.location.Priority
import java.io.OutputStreamWriter
import java.net.HttpURLConnection
import java.net.URL
import java.net.URLEncoder

class TrackingService : Service() {
    private val channelId = "macropac_tracking_channel"
    private val notificationId = 7788
    private lateinit var fused: FusedLocationProviderClient
    private var callback: LocationCallback? = null

    override fun onCreate() {
        super.onCreate()
        fused = LocationServices.getFusedLocationProviderClient(this)
        criarCanal()
        startForeground(notificationId, criarNotificacao("Rastreamento ativo"))
        iniciarGps()
    }

    override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
        iniciarGps()
        return START_STICKY
    }

    override fun onDestroy() {
        callback?.let { fused.removeLocationUpdates(it) }
        super.onDestroy()
    }

    override fun onBind(intent: Intent?): IBinder? = null

    private fun criarCanal() {
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
            val canal = NotificationChannel(
                channelId,
                "Macropac Rastreamento",
                NotificationManager.IMPORTANCE_LOW
            )
            canal.description = "Rastreamento de frota em segundo plano"
            val manager = getSystemService(NotificationManager::class.java)
            manager.createNotificationChannel(canal)
        }
    }

    private fun criarNotificacao(texto: String): Notification {
        return NotificationCompat.Builder(this, channelId)
            .setContentTitle("Macropac Rastreamento")
            .setContentText(texto)
            .setSmallIcon(android.R.drawable.ic_menu_mylocation)
            .setOngoing(true)
            .setPriority(NotificationCompat.PRIORITY_LOW)
            .build()
    }

    private fun atualizarNotificacao(texto: String) {
        val manager = getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
        manager.notify(notificationId, criarNotificacao(texto))
    }

    private fun iniciarGps() {
        if (ActivityCompat.checkSelfPermission(this, Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED &&
            ActivityCompat.checkSelfPermission(this, Manifest.permission.ACCESS_COARSE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
            atualizarNotificacao("Permissão de localização pendente")
            return
        }

        if (callback != null) return

        val request = LocationRequest.Builder(Priority.PRIORITY_HIGH_ACCURACY, 15000L)
            .setMinUpdateIntervalMillis(10000L)
            .setMaxUpdateDelayMillis(20000L)
            .build()

        callback = object : LocationCallback() {
            override fun onLocationResult(result: LocationResult) {
                val location = result.lastLocation ?: return
                enviarLocalizacao(location)
            }
        }

        fused.requestLocationUpdates(request, callback!!, Looper.getMainLooper())
    }

    private fun token(): String {
        val prefs = getSharedPreferences("FlutterSharedPreferences", Context.MODE_PRIVATE)
        return prefs.getString("flutter.token", "") ?: ""
    }

    private fun enviarLocalizacao(location: Location) {
        Thread {
            try {
                val t = token()
                if (t.isEmpty()) {
                    atualizarNotificacao("Aguardando login")
                    return@Thread
                }

                val params = linkedMapOf(
                    "token" to t,
                    "latitude" to location.latitude.toString(),
                    "longitude" to location.longitude.toString(),
                    "velocidade" to if (location.hasSpeed()) location.speed.toString() else "",
                    "precisao" to if (location.hasAccuracy()) location.accuracy.toString() else "",
                    "bateria" to "",
                    "origem" to "apk_native_background"
                )

                val body = params.map {
                    URLEncoder.encode(it.key, "UTF-8") + "=" + URLEncoder.encode(it.value, "UTF-8")
                }.joinToString("&")

                val url = URL("https://mega4tech.com.br/macropac_rastreamento/api/app_salvar_localizacao.php")
                val conn = url.openConnection() as HttpURLConnection
                conn.requestMethod = "POST"
                conn.doOutput = true
                conn.connectTimeout = 20000
                conn.readTimeout = 20000
                conn.setRequestProperty("Content-Type", "application/x-www-form-urlencoded")

                OutputStreamWriter(conn.outputStream).use {
                    it.write(body)
                    it.flush()
                }

                val code = conn.responseCode
                if (code in 200..299) {
                    atualizarNotificacao("Localização enviada")
                } else {
                    atualizarNotificacao("Erro ao enviar: $code")
                }

                conn.disconnect()
            } catch (e: Exception) {
                atualizarNotificacao("Tentando enviar localização")
            }
        }.start()
    }
}
'''
          (kotlin_dir / "MainActivity.kt").write_text(main_activity.strip(), encoding="utf-8")
          (kotlin_dir / "TrackingService.kt").write_text(tracking_service.strip(), encoding="utf-8")
          PY

      - name: Baixar dependências
        script: |
          flutter pub get

      - name: Gerar APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
