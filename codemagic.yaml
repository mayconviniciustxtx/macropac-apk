workflows:
  android-apk:
    name: Macropac APK
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Criar estrutura Android
        script: |
          rm -rf android
          flutter create --platforms=android --project-name macropac_rastreamento .

      - name: Ajustar Android Manifest
        script: |
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")

          if not manifest.exists():
              raise Exception("AndroidManifest.xml não encontrado")

          texto = manifest.read_text(encoding="utf-8")

          permissoes = [
              '    <uses-permission android:name="android.permission.INTERNET"/>',
              '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>',
              '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>',
              '    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>',
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>',
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>'
          ]

          bloco = "\n".join([p for p in permissoes if p not in texto])

          if bloco:
              pos = texto.find(">")
              texto = texto[:pos + 1] + "\n" + bloco + texto[pos + 1:]

          manifest.write_text(texto, encoding="utf-8")
          PY

      - name: Baixar dependências
        script: |
          flutter pub get

      - name: Gerar APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
