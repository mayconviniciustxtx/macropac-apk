workflows:
  android-apk:
    name: Macropac APK
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Criar estrutura Android
        script: |
          rm -rf android
          flutter create --platforms=android --project-name macropac_rastreamento .

      - name: Ajustar Android Manifest e Gradle
        script: |
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()

          perms = '''
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
          '''
          if 'android.permission.INTERNET' not in text:
              idx = text.find('>')
              text = text[:idx+1] + perms + text[idx+1:]

          if 'id.flutter.flutter_background_service.BackgroundService' not in text:
              service = '''
                  <service
                      android:name="id.flutter.flutter_background_service.BackgroundService"
                      android:foregroundServiceType="location"
                      android:exported="false" />
              '''
              text = text.replace('</application>', service + '\n    </application>')

          manifest.write_text(text)

          gradle = Path('android/app/build.gradle')
          g = gradle.read_text()
          g = g.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 23')
          gradle.write_text(g)
          PY

      - name: Baixar dependências
        script: |
          flutter pub get

      - name: Gerar APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
