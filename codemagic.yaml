workflows:
  android-apk:
    name: Macropac APK
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable

    scripts:
      - name: Criar estrutura Android
        script: |
          rm -rf android
          flutter create --platforms=android --project-name macropac_rastreamento .

      - name: Ajustar permissões Android
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>' $MANIFEST

      - name: Baixar dependências
        script: |
          flutter pub get

      - name: Gerar APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk